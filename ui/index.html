<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="window boot">
    <!-- Titlebar -->
    <header class="bar" data-tauri-drag-region>
      <div class="bar-left" data-tauri-drag-region>
        <span class="bar-label" data-tauri-drag-region>todo</span>
        <span class="bar-count" id="bar-count" data-tauri-drag-region></span>
      </div>
      <div class="bar-controls">
        <button class="bar-btn" id="btn-theme" aria-label="Toggle theme">
          <svg class="theme-icon-dark" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <svg class="theme-icon-light" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 9.3A6.5 6.5 0 016.7 2 6 6 0 1014 9.3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="bar-btn" id="btn-min" aria-label="Minimize">─</button>
        <button class="bar-btn" id="btn-max" aria-label="Maximize">□</button>
        <button class="bar-btn bar-close" id="btn-close" aria-label="Close">✕</button>
      </div>
    </header>

    <main class="body">
      <!-- List switcher -->
      <div class="list-switcher">
        <button class="list-current" id="list-current">
          <span class="list-current-name" id="list-name">Personal</span>
          <svg class="list-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="list-dropdown" id="list-dropdown">
          <div class="list-dropdown-items" id="list-dropdown-items"></div>
          <div class="list-dropdown-sep"></div>
          <button class="list-dropdown-add" id="list-add">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            New list
          </button>
        </div>
      </div>

      <!-- Counts -->
      <div class="counts">
        <div class="count-item">
          <span class="count-num" id="ct-total">0</span>
          <span class="count-tag">tasks</span>
        </div>
        <div class="count-sep"></div>
        <div class="count-item">
          <span class="count-num" id="ct-open">0</span>
          <span class="count-tag">open</span>
        </div>
        <div class="count-sep"></div>
        <div class="count-item">
          <span class="count-num" id="ct-done">0</span>
          <span class="count-tag">done</span>
        </div>
      </div>

      <!-- Input -->
      <form id="form" class="field">
        <input id="input" type="text" placeholder="New task…" autocomplete="off" spellcheck="false" maxlength="200" />
        <button type="submit" class="field-btn" aria-label="Add">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </form>

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="Search tasks…" autocomplete="off" spellcheck="false" />
        <button class="search-clear" id="search-clear" aria-label="Clear search">✕</button>
      </div>

      <!-- Filters -->
      <nav class="tabs">
        <button class="tab on" data-f="all">All</button>
        <button class="tab" data-f="active">Active</button>
        <button class="tab" data-f="completed">Done</button>
        <span class="tab-pill" id="pill"></span>
      </nav>

      <!-- List -->
      <div class="scroll" id="scroll">
        <ul class="list" id="list"></ul>
        <div class="nil" id="nil">
          <div class="nil-icon" id="nil-icon"></div>
          <p class="nil-title" id="nil-title">No tasks</p>
          <p class="nil-sub" id="nil-sub">Type above to add one</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="foot" id="foot">
        <button class="foot-btn" id="clear-done">Clear done</button>
      </div>
    </main>

    <!-- Undo toast -->
    <div class="toast" id="toast">
      <span class="toast-text">Task deleted</span>
      <button class="toast-undo" id="toast-undo">Undo</button>
      <div class="toast-bar" id="toast-bar"></div>
    </div>

    <!-- Keyboard hint -->
    <div class="kb-hint" id="kb-hint"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
